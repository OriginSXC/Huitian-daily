# ============ 回天日报 - 默认配置 ============
# 用户首次启动会自动复制本文件为同目录 config.yaml；改 config.yaml 即可
# config.yaml 里写过的字段会覆盖本文件；没写的字段沿用默认值

# 回天日报推送（聚合报告）
report:
  cron: '0 40 8 * * ?'        # 每天 08:40
  jitter: 50                   # 启动随机抖动秒数（对齐源 jitter=50），0 关闭
  isAutoPush: true
  groupList: []                # 推送目标群号，可在 config.yaml 填，例如 ['123456','654321']

# 摸鱼日历推送
moyu:
  cron: '0 0 10 * * ?'         # 每天 10:00
  jitter: 50
  isAutoPush: true
  groupList: []

# 每日番剧推送
bangumi:
  cron: '0 5 0 * * ?'          # 每天 00:05
  jitter: 0
  isAutoPush: true
  groupList: []

# 周日清理缓存
cleanup:
  cron: '0 0 3 * * 0'          # 每周日 03:00
  enable: true
  targets: ['bangumi', 'epic'] # 仅清这两类缓存（其它保留按天 cache）

# 外部 API
api:
  six_base: 'https://60s.viki.moe'  # 60s 主接口；如域名不可用换公共实例
  alapi_token: ''                   # 预留：ALAPI 早报 token（目前未使用）
  timeout_ms: 15000

# 指令行为
command:
  require_at_bot_in_group: false    # 群里发 "回天日报" 是否必须 @bot；true=严格(对齐源版)
